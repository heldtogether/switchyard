name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  test-go:
    name: Run Go Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
  
  test-ui:
    name: Run UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Run UI tests
        working-directory: ui
        run: npm test

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [test-go, test-ui]
    
    strategy:
      matrix:
        image:
          - name: api
            dockerfile: build/api.Dockerfile
            context: .
          - name: worker
            dockerfile: build/worker.Dockerfile
            context: .
          - name: example-job
            dockerfile: build/example-job/Dockerfile
            context: ./build/example-job
          - name: ui
            dockerfile: build/ui.Dockerfile
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/heldtogether/switchyard-${{ matrix.image.name }}
          tags: |
            # SHA tag
            type=sha,prefix=sha-,format=short
            # Version tags (for releases like v1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Latest tag (only on main branch and version tags)
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set display version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-packages:
    name: Cleanup Old Package Versions
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        image:
          - name: api
          - name: worker
          - name: example-job
          - name: ui

    steps:
      - name: Delete old non-versioned package builds
        uses: actions/github-script@v7
        env:
          PACKAGE_NAME: switchyard-${{ matrix.image.name }}
          RETAIN_COUNT: "10"
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = process.env.PACKAGE_NAME;
            const retainCount = parseInt(process.env.RETAIN_COUNT, 10);

            const isSemverTag = (tag) =>
              /^\d+\.\d+\.\d+$/.test(tag) ||
              /^\d+\.\d+$/.test(tag) ||
              /^\d+$/.test(tag);

            const keepVersion = (tags) =>
              tags.some((tag) => tag === 'latest' || isSemverTag(tag));

            const ownerInfo = await github.rest.users.getByUsername({ username: owner });
            const isOrg = ownerInfo.data.type === 'Organization';

            const listVersions = isOrg
              ? github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg
              : github.rest.packages.getAllPackageVersionsForPackageOwnedByUser;

            const listParams = isOrg
              ? {
                  org: owner,
                  package_type: 'container',
                  package_name: packageName,
                  per_page: 100,
                }
              : {
                  username: owner,
                  package_type: 'container',
                  package_name: packageName,
                  per_page: 100,
                };

            const deleteVersion = isOrg
              ? github.rest.packages.deletePackageVersionForOrg
              : github.rest.packages.deletePackageVersionForUser;

            const versions = await github.paginate(listVersions, listParams);

            const deletable = versions
              .map((version) => {
                const tags = (version.metadata && version.metadata.container && version.metadata.container.tags) || [];
                return {
                  id: version.id,
                  updatedAt: new Date(version.updated_at),
                  tags,
                };
              })
              .filter((version) => !keepVersion(version.tags))
              .sort((a, b) => b.updatedAt - a.updatedAt);

            const toDelete = deletable.slice(retainCount);
            core.info(`Found ${deletable.length} deletable versions for ${packageName}. Keeping ${retainCount}, deleting ${toDelete.length}.`);

            for (const version of toDelete) {
              core.info(`Deleting version ${version.id} (tags: ${version.tags.join(', ') || 'none'})`);
              const deleteParams = isOrg
                ? {
                    org: owner,
                    package_type: 'container',
                    package_name: packageName,
                    package_version_id: version.id,
                  }
                : {
                    username: owner,
                    package_type: 'container',
                    package_name: packageName,
                    package_version_id: version.id,
                  };
              await deleteVersion(deleteParams);
            }

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, cleanup-packages]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ All images built and pushed successfully"
            echo "Images available at: https://github.com/heldtogether/switchyard/pkgs/container"
          else
            echo "❌ Build failed"
            exit 1
          fi
