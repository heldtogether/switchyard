# Switchyard Production Configuration
# Copy from config.example.yaml and customize

api:
  port: 8080
  host: "0.0.0.0"
  base_url: "http://localhost:8080"  # Base URL for API (injected as SWITCHYARD_API_URL in jobs)
  read_timeout: 30s
  write_timeout: 30s
  auth:
    mode: api_key
    enabled: true
    api_key: "${API_KEY}" # legacy compatibility
    api_key_auth:
      enabled: true
      key: "${API_KEY}"
    oidc:
      enabled: false
      issuer_url: "${OIDC_ISSUER_URL}"
      client_id: "${OIDC_CLIENT_ID}"
      client_secret: "${OIDC_CLIENT_SECRET}"
      redirect_url: "${OIDC_REDIRECT_URL}"
      logout_url: "${OIDC_LOGOUT_URL}"
      scopes: [openid, profile, email]
      session_signing_key: "${OIDC_SESSION_SIGNING_KEY}"
      post_login_redirect: "/"
      post_logout_redirect: "/login"
      cookie:
        name: switchyard_session
        secure: true
        same_site: lax
        ttl: 24h

worker:
  concurrency: 5
  poll_interval: 1s
  graceful_shutdown: 30s

database:
  url: "postgres://jobrunner:${DATABASE_PASSWORD}@postgres:5432/jobrunner?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

queue:
  type: redis
  url: "redis://redis:6379/0"
  queue_name: "jobrunner:jobs"

storage:
  type: s3
  endpoint: "${S3_ENDPOINT}"
  access_key: "${S3_ACCESS_KEY}"
  secret_key: "${S3_SECRET_KEY}"
  bucket: "jobrunner"
  region: "us-east-1"
  use_ssl: true
  create_bucket: false

executor:
  type: swarm
  swarm:
    nfs_base_path: "/mnt/jobrunner"
    docker_host: "unix:///var/run/docker.sock"
    network_driver: overlay
    network_isolated: true
    defaults:
      resources:
        cpu: "1.0"
        memory: "2g"
        memory_reservation: "512m"
      timeout: "1h"
      restart_policy: "never"
      constraints:
        - "node.role==worker"
    cleanup:
      remove_on_complete: true
      keep_failed_services: false
      retention_hours: 24

logging:
  level: info
  format: json
  output: stdout

metrics:
  enabled: false
  port: 9090
  path: /metrics
