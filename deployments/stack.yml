# Docker Swarm Stack for Switchyard Job Runner
# Deploy with: docker stack deploy -c deployments/stack.yml switchyard
#
# Prerequisites:
# 1. External Postgres database (configured via DATABASE_URL)
# 2. NFS share mounted at same path on all Swarm nodes
# 3. S3-compatible storage configured
# 4. Docker secrets created (see README.md)

version: '3.8'

services:
  # =============================================================================
  # Redis - Job Queue
  # =============================================================================
  redis:
    image: redis:7-alpine
    networks:
      - internal
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # =============================================================================
  # API - HTTP Server
  # =============================================================================
  api:
    image: ghcr.io/heldtogether/switchyard-api:${VERSION:-latest}
    networks:
      - internal
      - public
    ports:
      - "8080:8080"
    configs:
      - source: switchyard_config
        target: /app/config.yaml
    secrets:
      - switchyard_api_key
      - switchyard_s3_access_key
      - switchyard_s3_secret_key
    environment:
      # Override config via environment variables
      API_KEY_FILE: /run/secrets/switchyard_api_key
      S3_ACCESS_KEY_FILE: /run/secrets/switchyard_s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/switchyard_s3_secret_key
      
      # Database connection (external Postgres)
      DATABASE_URL: ${DATABASE_URL}
      
      # Redis connection (internal service)
      QUEUE_URL: redis://redis:6379/0
      
      # S3 configuration
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-jobrunner}
      S3_REGION: ${S3_REGION:-us-east-1}
      
      # Logging
      LOGGING_LEVEL: ${LOGGING_LEVEL:-info}
      LOGGING_FORMAT: json
    deploy:
      replicas: ${API_REPLICAS:-2}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "com.switchyard.service=api"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # =============================================================================
  # Worker - Job Executor
  # =============================================================================
  worker:
    image: ghcr.io/heldtogether/switchyard-worker:${VERSION:-latest}
    networks:
      - internal
    configs:
      - source: switchyard_config
        target: /app/config.yaml
    secrets:
      - switchyard_s3_access_key
      - switchyard_s3_secret_key
    volumes:
      # Docker socket - required for creating job containers
      - /var/run/docker.sock:/var/run/docker.sock
      
      # NFS mount - required for artefact collection
      # ⚠️  This path MUST match executor.swarm.nfs_base_path in config.yaml
      # ⚠️  This path MUST be mounted on ALL Swarm nodes
      - type: bind
        source: /mnt/jobrunner
        target: /mnt/jobrunner
    environment:
      # Override config via environment variables
      S3_ACCESS_KEY_FILE: /run/secrets/switchyard_s3_access_key
      S3_SECRET_KEY_FILE: /run/secrets/switchyard_s3_secret_key
      
      # Database connection (external Postgres)
      DATABASE_URL: ${DATABASE_URL}
      
      # Redis connection (internal service)
      QUEUE_URL: redis://redis:6379/0
      
      # S3 configuration
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-jobrunner}
      S3_REGION: ${S3_REGION:-us-east-1}
      
      # Executor configuration
      EXECUTOR_TYPE: swarm
      EXECUTOR_NFS_BASE: /mnt/jobrunner
      
      # Worker configuration
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      
      # Logging
      LOGGING_LEVEL: ${LOGGING_LEVEL:-info}
      LOGGING_FORMAT: json
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      placement:
        constraints:
          # Workers should run on nodes with NFS access
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
      labels:
        - "com.switchyard.service=worker"

# =============================================================================
# Networks
# =============================================================================
networks:
  # Internal network - for service-to-service communication
  internal:
    driver: overlay
    attachable: false
    internal: false  # Needs external access for S3 and external Postgres
    
  # Public network - for API external access
  public:
    driver: overlay
    attachable: false

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local

# =============================================================================
# Configs
# =============================================================================
configs:
  switchyard_config:
    file: ./config.yaml

# =============================================================================
# Secrets
# =============================================================================
# Create secrets before deploying:
#   echo "your-api-key" | docker secret create switchyard_api_key -
#   echo "your-s3-access-key" | docker secret create switchyard_s3_access_key -
#   echo "your-s3-secret-key" | docker secret create switchyard_s3_secret_key -
secrets:
  switchyard_api_key:
    external: true
  switchyard_s3_access_key:
    external: true
  switchyard_s3_secret_key:
    external: true
