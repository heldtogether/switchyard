# Switchyard Job Runner Configuration
# Copy this file to config.yaml and customize for your environment
# Environment variables can override any setting (see README for details)

# ================================================================================
# API Server Configuration
# ================================================================================
api:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s
  
  # Authentication (MVP: simple API key)
  auth:
    enabled: true
    api_key: "${API_KEY}"  # Set via API_KEY env var or API_KEY_FILE

# ================================================================================
# Worker Configuration
# ================================================================================
worker:
  concurrency: 5              # Number of parallel jobs
  poll_interval: 1s           # How often to check for new jobs
  graceful_shutdown: 30s      # Wait time for jobs to finish on shutdown

# ================================================================================
# Database Configuration (Postgres)
# ================================================================================
database:
  url: "postgres://jobrunner:password@postgres:5432/jobrunner?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

# ================================================================================
# Queue Configuration (Redis)
# ================================================================================
queue:
  type: redis
  url: "redis://redis:6379/0"
  queue_name: "jobrunner:jobs"

# ================================================================================
# Object Storage Configuration (S3-compatible)
# ⚠️  MinIO is NOT included in stack.yml - configure your existing S3 storage here
# ================================================================================
storage:
  type: s3
  endpoint: "https://s3.amazonaws.com"       # Or your S3-compatible endpoint
  access_key: "${S3_ACCESS_KEY}"             # Set via env var or S3_ACCESS_KEY_FILE
  secret_key: "${S3_SECRET_KEY}"             # Set via env var or S3_SECRET_KEY_FILE
  bucket: "jobrunner"
  region: "us-east-1"
  use_ssl: true
  create_bucket: false                       # Set true to auto-create bucket

# ================================================================================
# Executor Configuration
# ================================================================================
executor:
  type: swarm                                # swarm or kube (kube not yet implemented)
  
  # Docker Swarm Executor
  swarm:
    # ⚠️  CRITICAL: NFS mount base path
    # This path MUST be:
    #   1. An NFS share mounted on ALL Swarm nodes at the same path
    #   2. Readable and writable by the worker containers
    #   3. Accessible by job containers for writing outputs
    #
    # Example NFS mount command (run on all nodes):
    #   sudo mount -t nfs nfs-server.local:/export/jobrunner /mnt/jobrunner
    #
    # To change this path:
    #   1. Update this value in config.yaml
    #   2. Update the volume mount in stack.yml (worker service)
    #   3. Ensure all Swarm nodes mount NFS at the new path
    nfs_base_path: "/mnt/jobrunner"
    
    # Docker connection
    docker_host: "unix:///var/run/docker.sock"
    
    # Network configuration
    network_driver: overlay
    network_isolated: true                   # Jobs run in isolated networks (no internet)
    
    # Job Defaults (can be overridden per-job via API)
    defaults:
      # Resource limits
      resources:
        cpu: "1.0"                           # CPU limit (1.0 = 1 core)
        memory: "2g"                         # Memory limit (units: b, k, m, g)
        memory_reservation: "512m"           # Soft memory reservation
      
      # Timeout (jobs exceeding this will be killed)
      timeout: "1h"                          # Duration: 30s, 5m, 1h, etc.
      
      # Restart policy
      restart_policy: "never"                # never, on-failure, always
      
      # Node constraints (where jobs can run)
      # Common options:
      #   - node.role==worker      (only on worker nodes)
      #   - node.role==manager     (only on manager nodes)  
      #   - node.labels.gpu==true  (only on nodes with GPU label)
      constraints:
        - "node.role==worker"
    
    # Cleanup policy
    cleanup:
      remove_on_complete: true               # Remove services after job completes
      keep_failed_services: false            # Set true to keep failed services for debugging
      retention_hours: 24                    # How long to keep completed job data on NFS

  # Kubernetes Executor (not yet implemented)
  # kube:
  #   kubeconfig: "/path/to/kubeconfig"
  #   namespace: "jobrunner"

# ================================================================================
# Logging Configuration
# ================================================================================
logging:
  level: info                                # debug, info, warn, error
  format: json                               # json or console
  output: stdout                             # stdout, stderr, or file path

# ================================================================================
# Metrics Configuration (optional, not yet implemented)
# ================================================================================
metrics:
  enabled: false
  port: 9090
  path: /metrics
