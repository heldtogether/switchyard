# Switchyard Job Runner Configuration
# Copy this file to config.yaml and customize for your environment.
# Environment variables can override any setting (see README for details).
#
# Reading guide:
# - The API service reads api, database, queue, storage, executor, scheduler, logging.
# - The worker service reads worker, database, queue, storage, executor, logging.
# - Values shown here are safe defaults for local/dev. Production sizing varies.

# ==============================================================================
# API Server Configuration
# ==============================================================================
api:
  # Listen address and port for the HTTP API.
  host: "0.0.0.0"
  port: 8080

  # Public base URL for the API. This is injected into job containers as
  # SWITCHYARD_API_URL so jobs can call back to the API.
  # Example: "https://switchyard.example.com"
  base_url: "http://localhost:8080"

  # HTTP timeouts for incoming requests. Increase if you expect large payloads
  # or slow clients; keep reasonable in prod to avoid stuck connections.
  read_timeout: 30s
  write_timeout: 30s

  # Authentication
  auth:
    # Supported modes: disabled, api_key, oidc, hybrid.
    # Use "hybrid" to enable browser SSO while keeping API keys for automation.
    mode: api_key

    # Legacy compatibility (still supported):
    enabled: true
    api_key: "${API_KEY}"

    api_key_auth:
      enabled: true
      key: "${API_KEY}"

    oidc:
      enabled: false
      issuer_url: "${OIDC_ISSUER_URL}"
      client_id: "${OIDC_CLIENT_ID}"
      client_secret: "${OIDC_CLIENT_SECRET}"
      redirect_url: "${OIDC_REDIRECT_URL}"
      logout_url: "${OIDC_LOGOUT_URL}" # Optional IdP logout endpoint. If set, /v1/auth/logout redirects here after clearing local session.
      scopes:
        - openid
        - profile
        - email
      # Use absolute UI URLs when UI and API are on different origins.
      post_login_redirect: "/"
      post_logout_redirect: "/login"
      session_signing_key: "${OIDC_SESSION_SIGNING_KEY}"
      cookie:
        name: switchyard_session
        secure: false
        same_site: lax
        ttl: 24h

  rbac:
    enabled: false
    single_tenant: true
    default_workspace_slug: "default"
    service_accounts:
      - name: "automation"
        auth_method: "api_key"
        allowed_workspaces: ["default"]
        allowed_projects:
          default: []

  registry_secrets:
    encryption:
      # Encrypt registry credentials at rest using AES-256-GCM.
      enabled: true
      # Stable key ID for the currently active key used for new writes.
      active_key_id: "dev-key-1"
      # Base64-encoded 32-byte key. Override in production via env / *_FILE.
      active_key: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      # Optional previous key for seamless key rotation / re-wrap.
      previous_key_id: "${REGISTRY_SECRETS_PREVIOUS_KEY_ID}"
      previous_key: "${REGISTRY_SECRETS_PREVIOUS_KEY}"

# ==============================================================================
# Worker Configuration
# ==============================================================================
worker:
  # Number of parallel jobs a worker will execute.
  # Higher values increase throughput but also increase CPU/memory/DB load.
  concurrency: 5

  # How often to check for new jobs when the queue is idle.
  # Lower = lower latency, higher = less idle CPU/DB usage.
  poll_interval: 1s

  # Grace period for in-flight jobs to finish during worker shutdown.
  graceful_shutdown: 30s

  # Heartbeats tell the API that this worker is alive. The scheduler uses this
  # to detect stale nodes.
  heartbeat_interval: 10s

  # Optional override for node identity. If empty, Switchyard autodetects.
  node_id: ""

  # Optional override for total GPUs on this node. If 0, autodetect.
  gpu_count: 0

  # Docker image used for GPU autodetection via nvidia-smi.
  gpu_detect_image: "nvidia/cuda:12.4.1-runtime-ubuntu22.04"

  # Redis-only backoff settings for delayed requeue when GPUs are unavailable.
  # These control how quickly the worker retries jobs that need GPUs.
  retry_base_delay: 1s
  retry_max_delay: 30s
  retry_jitter: 0.2

# ==============================================================================
# Database Configuration (Postgres)
# ==============================================================================
database:
  url: "postgres://jobrunner:password@postgres:5432/jobrunner?sslmode=disable"

  # Connection pool sizing. Tune based on DB capacity and worker concurrency.
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

# ==============================================================================
# Queue Configuration (Redis or RabbitMQ)
# ==============================================================================
queue:
  # Queue backend:
  # - redis: simple setup, good for dev and moderate throughput
  # - rabbitmq: better for priorities, delayed jobs, and higher throughput
  type: rabbitmq

  # Connection URL. Use amqp:// for RabbitMQ or redis:// for Redis.
  url: "amqp://rabbitmq:5672/"

  # Queue name used by both Redis and RabbitMQ.
  queue_name: "switchyard.jobs"

  # RabbitMQ-only settings:
  # - exchange: main exchange for publishing jobs
  # - delay_exchange: used for delayed retries
  exchange: "jobs"
  delay_exchange: "jobs.delay"

  # RabbitMQ-only: visibility timeout for task execution.
  # If a worker does not acknowledge within this time, the job can be redelivered.
  task_timeout: 10s

  # RabbitMQ-only: max priority for queued jobs (0 disables priority).
  max_priority: 10

  # Redis-only: delay queue poll interval and batch size for requeue.
  requeue_interval: 2s
  requeue_batch: 100

# ==============================================================================
# Scheduler / Reaper Configuration
# ==============================================================================
scheduler:
  # How often to scan for stale nodes and orphaned jobs.
  reaper_interval: 30s

  # If a worker has not sent a heartbeat within this window, it is considered
  # stale. If 0, defaults to 3x worker.heartbeat_interval.
  heartbeat_timeout: 30s

# ==============================================================================
# Object Storage Configuration (S3-compatible)
# ==============================================================================
storage:
  # Storage backend. Only s3 is supported today.
  type: s3

  # S3-compatible endpoint. Examples:
  # - AWS: https://s3.amazonaws.com
  # - MinIO: http://minio:9000
  endpoint: "https://s3.amazonaws.com"

  # Credentials (use env vars or *_FILE to keep secrets out of config).
  access_key: "${S3_ACCESS_KEY}"
  secret_key: "${S3_SECRET_KEY}"

  bucket: "jobrunner"
  region: "us-east-1"

  # Use SSL for the S3 endpoint. Disable only for local/dev endpoints.
  use_ssl: true

  # If true, Switchyard will attempt to create the bucket on startup.
  # Recommended for dev; in production you may prefer pre-provisioning.
  create_bucket: false

# ==============================================================================
# Executor Configuration
# ==============================================================================
executor:
  # Execution backend:
  # - docker: single-host Docker (simple, good for dev or small deployments)
  # - swarm: Docker Swarm (multi-node scheduling and placement constraints)
  # - kube: Kubernetes (not implemented yet)
  type: swarm

  # ---------------------------------------------------------------------------
  # Docker Executor
  # ---------------------------------------------------------------------------
  docker:
    # NFS mount base path for job outputs.
    # This path MUST be:
    # 1) An NFS share mounted on all nodes at the same path
    # 2) Readable and writable by the worker containers
    # 3) Accessible by job containers for writing outputs
    nfs_base_path: "/mnt/jobrunner"

    # Docker API connection string. For local socket:
    # "unix:///var/run/docker.sock"
    docker_host: "unix:///var/run/docker.sock"

    # If true, jobs run in isolated networks (no outbound internet).
    # Use true for tighter isolation; false for jobs that need external access.
    network_isolated: true

    # Job Defaults (can be overridden per-job via API)
    defaults:
      resources:
        # CPU limit (1.0 = 1 core). Empty means no explicit limit.
        cpu: "1.0"

        # Memory limit (units: b, k, m, g). Empty means no explicit limit.
        memory: "2g"

      # Default timeout for jobs (jobs exceeding this will be killed).
      timeout: "1h"

      # Node constraints (reserved for future use; enforced by swarm executor).
      constraints: []

  # ---------------------------------------------------------------------------
  # Docker Swarm Executor
  # ---------------------------------------------------------------------------
  swarm:
    # NFS mount base path for job outputs.
    # This path MUST be:
    # 1) An NFS share mounted on all Swarm nodes at the same path
    # 2) Readable and writable by the worker containers
    # 3) Accessible by job containers for writing outputs
    nfs_base_path: "/mnt/jobrunner"

    # Docker API connection string.
    docker_host: "unix:///var/run/docker.sock"

    # If true, jobs run in isolated networks (no outbound internet).
    network_isolated: true

    # Job Defaults (can be overridden per-job via API)
    defaults:
      resources:
        cpu: "1.0"
        memory: "2g"

      # Default timeout for jobs.
      timeout: "1h"

      # Node constraints determine where jobs can run.
      # Examples:
      # - node.role==worker      (only on worker nodes)
      # - node.role==manager     (only on manager nodes)
      # - node.labels.gpu==true  (only on nodes with GPU label)
      constraints:
        - "node.role==worker"

    # Cleanup policy after job completion
    cleanup:
      # Remove services after job completes.
      remove_on_complete: true

      # Keep failed services for debugging.
      keep_failed_services: false

  # ---------------------------------------------------------------------------
  # Kubernetes Executor (not yet implemented)
  # ---------------------------------------------------------------------------
  # kube:
  #   kubeconfig: "/path/to/kubeconfig"
  #   namespace: "jobrunner"

# ==============================================================================
# Logging Configuration
# ==============================================================================
logging:
  # debug, info, warn, error
  level: info

  # json (recommended for production log aggregation) or console (readable dev).
  format: json
